# RainierTrader Configuration

# Trading mode
mode: paper  # paper | live

# Watchlist
watchlist:
  - AAPL
  - MSFT
  - NVDA
  - GOOGL
  - TSLA

# Trading schedule
schedule:
  interval_minutes: 5        # How often to evaluate each symbol
  market_hours_only: true    # Only trade during market hours (9:30-16:00 ET)

# Strategy parameters
strategy:
  indicators:
    sma_fast: 20
    sma_slow: 50
    sma_trend: 200
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bb_period: 20
    bb_std: 2
  min_confidence: 0.6        # Minimum LLM confidence to act

# Risk management
risk:
  max_position_pct: 20       # Max % of portfolio per stock
  max_positions: 5           # Max concurrent positions
  stop_loss_pct: 3           # Per-trade stop loss %
  take_profit_pct: 8         # Per-trade take profit %
  daily_loss_limit_pct: 5    # Stop trading if daily loss exceeds this
  min_cash_reserve_pct: 20   # Always keep this % in cash

# Order settings
orders:
  type: market               # market | limit
  time_in_force: day         # day | gtc

# LLM settings
llm:
  model: claude-sonnet-4-6
  temperature: 0.3           # Low temperature for consistent decisions
  max_tokens: 1000

# Logging
logging:
  level: INFO                # DEBUG | INFO | WARNING | ERROR
  file: logs/rainier.log

# Notifications (Phase 2 — uncomment to enable)
# notifications:
#   telegram_bot_token: ""
#   telegram_chat_id: ""
